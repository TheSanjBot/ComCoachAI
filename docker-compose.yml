version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: commcoach-postgres
    environment:
      POSTGRES_DB: commcoach
      POSTGRES_USER: commcoach
      POSTGRES_PASSWORD: commcoach
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: commcoach-backend
    depends_on:
      - postgres
    env_file:
      - backend/.env
      - backend/.env.secrets
    environment:
      DATABASE_URL: postgresql+asyncpg://commcoach:commcoach@postgres:5432/commcoach
      FRONTEND_URL: http://localhost:3000
      ALLOWED_ORIGINS: http://localhost:3000
      CHROMA_PERSIST_DIRECTORY: /app/chroma
      DEBUG: "false"
    ports:
      - "8000:8000"
    volumes:
      - ./uploads:/app/uploads
      - ./reports:/app/reports
      - ./chroma:/app/chroma

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: commcoach-frontend
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000/api/v1
      NODE_ENV: production
    ports:
      - "3000:3000"

volumes:
  postgres_data:
